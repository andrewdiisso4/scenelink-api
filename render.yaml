# Render Blueprint — deploy with "New > Blueprint" pointing to this repo
services:
  - type: web
    name: scenelink-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://scenelink.app,https://www.scenelink.app
      - key: DATABASE_URL
        fromDatabase:
          name: scenelink-db
          property: connectionString

databases:
  - name: scenelink-db
    plan: free
    databaseName: scenelink
    postgresMajorVersion: "15"